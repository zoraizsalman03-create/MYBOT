<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .box { width: 400px; border: 1px solid #000; padding: 20px; }
        #display { height: 300px; overflow-y: auto; border: 1px solid #ccc; margin-bottom: 10px; }
        input { width: 70%; padding: 10px; }
        button { width: 25%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <div id="display"></div>
    <input type="text" id="msg">
    <button onclick="askAI()">Send</button>
</div>

<script>
    async function askAI() {
        const i = document.getElementById('msg');
        const d = document.getElementById('display');
        if (!i.value) return;

        d.innerHTML += `<p>User: ${i.value}</p>`;

        try {
            const r = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': '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'
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [{role: "user", content: i.value}]
                })
            });

            const data = await r.json();
            d.innerHTML += `<p>AI: ${data.choices[0].message.content}</p>`;
        } catch (e) {
            d.innerHTML += `<p>Error</p>`;
        }
        i.value = '';
    }
</script>

</body>
</html>
