<!DOCTYPE html>
<html>
<head>
    <title>AI Text Tool</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 500px; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; }
        input { width: 75%; padding: 10px; }
        button { width: 20%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="chat"></div>
    <input type="text" id="input" placeholder="Type here...">
    <button onclick="ask()">Send</button>
</div>

<script>
    async function ask() {
        const box = document.getElementById('chat');
        const input = document.getElementById('input');
        const text = input.value;
        if (!text) return;

        box.innerHTML += `<p><b>You:</b> ${text}</p>`;
        input.value = '';

        try {
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': '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'
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [{role: "user", content: text}]
                })
            });
            const data = await res.json();
            box.innerHTML += `<p><b>AI:</b> ${data.choices[0].message.content}</p>`;
        } catch (e) {
            box.innerHTML += `<p>Error!</p>`;
        }
    }
</script>

</body>
</html>
